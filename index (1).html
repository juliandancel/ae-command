<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Command · Motive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F9FAFB; color: #111827; font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 14px; }
  button { cursor: pointer; font-family: inherit; transition: all 0.15s; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #F3F4F6; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;
const el = React.createElement;

const STORAGE_KEY = 'ae-command-accounts-v1';

const M = {
  green: "#12B76A", greenLight: "#ECFDF5", greenDark: "#027A48",
  navy: "#101828", gray900: "#111827", gray700: "#374151",
  gray600: "#4B5563", gray500: "#6B7280", gray400: "#9CA3AF",
  gray300: "#D1D5DB", gray200: "#E5E7EB", gray100: "#F3F4F6", gray50: "#F9FAFB",
  white: "#FFFFFF", yellow: "#F59E0B", yellowLight: "#FFFBEB",
  red: "#EF4444", redLight: "#FEF2F2", blue: "#3B82F6", blueLight: "#EFF6FF",
  purple: "#8B5CF6", purpleLight: "#F5F3FF", orange: "#F97316", orangeLight: "#FFF7ED",
};

const BASES = {
  folsom:  { label: "Folsom",  address: "854 Blossom Rock Ln, Folsom, CA",  lat: 38.6468, lng: -121.1522, color: "#12B76A", emoji: "🏠" },
  vallejo: { label: "Vallejo", address: "132 Silverpine Ln, Vallejo, CA",    lat: 38.0782, lng: -122.2477, color: "#3B82F6", emoji: "🏠" },
  sf:      { label: "SF",      address: "1355 Market St, San Francisco, CA", lat: 37.7765, lng: -122.4172, color: "#F59E0B", emoji: "🏢" },
};

const TIER_COLORS = {
  1: { bg: "#FFF1F2", border: "#FECDD3", text: "#9F1239" },
  2: { bg: "#FFF7ED", border: "#FED7AA", text: "#9A3412" },
  3: { bg: "#FEFCE8", border: "#FDE68A", text: "#854D0E" },
  4: { bg: "#F0FDF4", border: "#BBF7D0", text: "#166534" },
  5: { bg: "#F9FAFB", border: "#E5E7EB", text: "#6B7280" },
};

const STATUS = {
  green:  { dot: "#12B76A", bg: "#ECFDF5", border: "#A7F3D0", label: "Active",          text: "#027A48" },
  yellow: { dot: "#F59E0B", bg: "#FFFBEB", border: "#FDE68A", label: "Follow up soon",  text: "#92400E" },
  red:    { dot: "#EF4444", bg: "#FEF2F2", border: "#FECACA", label: "Needs attention", text: "#991B1B" },
};

function deg2rad(d) { return d * Math.PI / 180; }
function milesBetween(lat1,lng1,lat2,lng2) {
  const R=3958.8, dLat=deg2rad(lat2-lat1), dLng=deg2rad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getBaseDists(lat,lng) {
  return Object.entries(BASES).map(([key,base])=>({key,label:base.label,color:base.color,miles:Math.round(milesBetween(lat,lng,base.lat,base.lng))})).sort((a,b)=>a.miles-b.miles);
}
function closestBase(lat,lng) { return getBaseDists(lat,lng)[0]; }
function getStatus(lastTouch,followUpDate) {
  if (followUpDate) { const diff=Math.floor((new Date(followUpDate)-new Date())/86400000); if(diff<0)return"red"; if(diff<=2)return"yellow"; }
  if(lastTouch<=2)return"green"; if(lastTouch<=7)return"yellow"; return"red";
}

function loadAccounts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveAccounts(accounts) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts)); } catch(e) {}
}

function TierBadge({tier,small}) {
  const tc=TIER_COLORS[tier]||TIER_COLORS[5];
  return el('span',{style:{fontSize:small?10:11,fontWeight:700,background:tc.bg,color:tc.text,border:`1px solid ${tc.border}`,padding:small?"1px 6px":"3px 8px",borderRadius:20,flexShrink:0}},`T${tier}`);
}

function ConfirmDialog({message,onConfirm,onCancel}) {
  return el('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}},
    el('div',{style:{background:M.white,borderRadius:12,padding:28,width:340,boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}},
      el('div',{style:{fontSize:15,fontWeight:600,color:M.navy,marginBottom:8}},"Are you sure?"),
      el('div',{style:{fontSize:13,color:M.gray600,marginBottom:24}},message),
      el('div',{style:{display:"flex",gap:10}},
        el('button',{onClick:onConfirm,style:{flex:1,padding:"11px",background:M.red,border:"none",borderRadius:8,color:M.white,fontSize:13,fontWeight:600}},"Delete"),
        el('button',{onClick:onCancel,style:{flex:1,padding:"11px",background:M.white,border:`1px solid ${M.gray200}`,borderRadius:8,color:M.gray600,fontSize:13,fontWeight:500}},"Cancel")
      )
    )
  );
}

function App() {
  const [accounts, setAccountsRaw] = useState(loadAccounts);
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState(null);
  const [logging, setLogging] = useState(false);
  const [logStep, setLogStep] = useState(1);
  const [logData, setLogData] = useState({connected:null,sendEmail:null,note:"",emailNote:""});
  const [editingActivity, setEditingActivity] = useState(null);
  const [view, setView] = useState("accounts");
  const [addingAccount, setAddingAccount] = useState(false);
  const [search, setSearch] = useState("");
  const [newAccount, setNewAccount] = useState({name:"",tier:3,contacts:[{name:"",title:""}],address:"",onsite:false});
  const [selectedBase, setSelectedBase] = useState(null);
  const [confirm, setConfirm] = useState(null);

  function setAccounts(updater) {
    setAccountsRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveAccounts(next);
      return next;
    });
  }

  const account = selected!==null ? accounts.find(a=>a.id===selected) : null;
  const todayFollowUps = accounts.filter(a=>a.followUpDate&&new Date(a.followUpDate)<=new Date());
  const onsiteAccounts = accounts.filter(a=>a.onsite);
  const emailQueue = accounts.flatMap(a=>a.activities.filter(act=>act.emailQueued&&!act.emailDone).map(act=>({...act,accountId:a.id,accountName:a.name,accountTier:a.tier})));
  const filteredOnsiteAccounts = selectedBase ? onsiteAccounts.filter(a=>a.lat&&closestBase(a.lat,a.lng).key===selectedBase) : onsiteAccounts;
  const s = account ? getStatus(account.lastTouch,account.followUpDate) : null;
  const sortedAccounts = [...accounts].filter(a=>a.name.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>(a.tier||5)-(b.tier||5));

  function startEdit() {
    const a=account;
    setEditData({name:a.name,tier:a.tier,onsite:a.onsite,address:a.address||"",notes:a.notes||"",contacts:a.contacts.length?[...a.contacts.map(c=>({...c}))]:[{name:"",title:""}]});
    setEditing(true);
  }
  function saveEdit() {
    setAccounts(prev=>prev.map(a=>a.id!==selected?a:{...a,name:editData.name,tier:parseInt(editData.tier),onsite:editData.onsite,address:editData.address,notes:editData.notes,contacts:editData.contacts.filter(c=>c.name.trim())}));
    setEditing(false);
  }
  function deleteAccount(id) {
    setConfirm({message:"This will permanently delete the account and all activity.",onConfirm:()=>{setAccounts(p=>p.filter(a=>a.id!==id));setSelected(null);setConfirm(null);}});
  }
  function deleteActivity(accountId,activityId) {
    setConfirm({message:"This will permanently delete this activity log.",onConfirm:()=>{
      setAccounts(p=>p.map(a=>a.id!==accountId?a:{...a,touchCount:Math.max(0,a.touchCount-1),activities:a.activities.filter(act=>act.id!==activityId)}));
      setConfirm(null);
    }});
  }
  function saveActivity(accountId,activityId,updated) {
    setAccounts(p=>p.map(a=>a.id!==accountId?a:{...a,activities:a.activities.map(act=>act.id===activityId?{...act,...updated}:act)}));
    setEditingActivity(null);
  }

  function startLog() { setLogging(true); setLogStep(1); setLogData({connected:null,sendEmail:null,note:"",emailNote:""}); }
  function submitLog() {
    const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const newId=Date.now();
    const newActivity={id:newId,type:"Call",connected:logData.connected,sendEmail:logData.sendEmail,emailQueued:logData.sendEmail==="Yes",emailDone:false,note:logData.note,emailNote:logData.emailNote,date:dateStr};
    setAccounts(prev=>prev.map(a=>a.id!==selected?a:{...a,lastTouch:0,touchCount:a.touchCount+1,activities:[newActivity,...a.activities]}));
    setLogging(false);
  }

  function markEmailDone(accountId,activityId,emailNote) {
    const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    setAccounts(p=>p.map(a=>a.id!==accountId?a:{...a,activities:a.activities.map(act=>act.id===activityId?{...act,emailDone:true,emailQueued:false,emailSentDate:dateStr,emailNote:emailNote||act.emailNote}:act)}));
  }

  function updateEmailNote(accountId,activityId,note) {
    setAccounts(p=>p.map(a=>a.id!==accountId?a:{...a,activities:a.activities.map(act=>act.id===activityId?{...act,emailNote:note}:act)}));
  }

  function updateTier(id,tier){setAccounts(p=>p.map(a=>a.id===id?{...a,tier}:a));}
  function toggleOnsite(id){setAccounts(p=>p.map(a=>a.id===id?{...a,onsite:!a.onsite}:a));}
  function updateNotes(id,notes){setAccounts(p=>p.map(a=>a.id===id?{...a,notes}:a));}

  function addAccount() {
    if(!newAccount.name.trim())return;
    const id=Date.now();
    setAccounts(prev=>[...prev,{id,name:newAccount.name,tier:parseInt(newAccount.tier),onsite:newAccount.onsite,address:newAccount.address,lat:null,lng:null,contacts:newAccount.contacts.filter(c=>c.name.trim()),lastTouch:999,followUpDate:null,touchCount:0,notes:"",activities:[]}]);
    setNewAccount({name:"",tier:3,contacts:[{name:"",title:""}],address:"",onsite:false});
    setAddingAccount(false);setSelected(id);setView("accounts");
  }

  const inputStyle={width:"100%",background:M.white,border:`1px solid ${M.gray200}`,borderRadius:8,padding:"10px 12px",color:M.gray900,fontSize:14,outline:"none",marginBottom:10};
  const labelStyle={fontSize:11,fontWeight:600,color:M.gray500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,display:"block"};
  const editInputStyle={...inputStyle,marginBottom:0,fontSize:13,padding:"8px 10px"};

  const tabs=[
    {key:"accounts",label:"Accounts"},
    {key:"today",label:`Today${todayFollowUps.length>0?` · ${todayFollowUps.length}`:""}`},
    {key:"emails",label:`Email Queue${emailQueue.length>0?` · ${emailQueue.length}`:""}`},
    {key:"visits",label:`Visits${onsiteAccounts.length>0?` · ${onsiteAccounts.length}`:""}`},
  ];

  return el('div',{style:{minHeight:"100vh",background:M.gray50,display:"flex",flexDirection:"column"}},

    el('div',{style:{background:M.white,borderBottom:`1px solid ${M.gray200}`,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,flexShrink:0}},
      el('div',{style:{display:"flex",alignItems:"center",gap:10}},
        el('div',{style:{background:M.green,borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}},
          el('svg',{width:16,height:16,viewBox:"0 0 16 16",fill:"none"},el('path',{d:"M8 2L14 5V8C14 11.3 11.4 14.4 8 15C4.6 14.4 2 11.3 2 8V5L8 2Z",stroke:"white",strokeWidth:1.5,fill:"none"}))
        ),
        el('span',{style:{fontSize:15,fontWeight:700,color:M.navy}},"AE Command"),
        el('span',{style:{fontSize:11,color:M.gray400,marginLeft:4}},"· Motive")
      ),
      el('div',{style:{display:"flex",gap:6,alignItems:"center"}},
        tabs.map(t=>el('button',{key:t.key,onClick:()=>{setView(t.key);setSelected(null);setEditing(false);},style:{background:view===t.key?M.green:"transparent",color:view===t.key?M.white:M.gray500,border:`1px solid ${view===t.key?M.green:M.gray200}`,borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:500}},t.label)),
        el('button',{onClick:()=>setAddingAccount(true),style:{background:M.navy,color:M.white,border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,marginLeft:4}},"+ Account")
      )
    ),

    el('div',{style:{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 56px)"}},

      view!=="visits"&&view!=="emails"&&el('div',{style:{width:264,background:M.white,borderRight:`1px solid ${M.gray200}`,overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column"}},
        view==="accounts"&&el('div',{style:{padding:"10px 12px",borderBottom:`1px solid ${M.gray100}`,flexShrink:0}},
          el('input',{type:"text",placeholder:"Search accounts...",value:search,onChange:ev=>setSearch(ev.target.value),style:{...inputStyle,marginBottom:0,fontSize:13,padding:"8px 12px"}})
        ),
        view==="today"&&el('div',{style:{padding:16}},
          el('div',{style:{fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${M.gray100}`}},"Due Follow-ups"),
          todayFollowUps.length===0
            ? el('div',{style:{color:M.gray400,fontSize:13,padding:"20px 0",textAlign:"center"}},"Nothing due today ✓")
            : todayFollowUps.map(a=>{
                const st=getStatus(a.lastTouch,a.followUpDate);
                return el('div',{key:a.id,onClick:()=>{setSelected(a.id);setView("accounts");},style:{padding:"12px",borderRadius:8,marginBottom:8,background:STATUS[st].bg,border:`1px solid ${STATUS[st].border}`,cursor:"pointer"}},
                  el('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},el(TierBadge,{tier:a.tier,small:true}),el('span',{style:{fontSize:13,fontWeight:600}},a.name)),
                  el('div',{style:{fontSize:12,color:STATUS[st].text}},"Due "+a.followUpDate)
                );
              })
        ),
        view==="accounts"&&el('div',{style:{overflowY:"auto",flex:1}},
          el('div',{style:{padding:"10px 16px",fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:`1px solid ${M.gray100}`}},sortedAccounts.length+" Accounts"),
          sortedAccounts.length===0
            ? el('div',{style:{padding:"32px 16px",textAlign:"center",color:M.gray400,fontSize:13}},
                el('div',{style:{fontSize:24,marginBottom:8}},"📋"),
                el('div',{style:{fontWeight:500,marginBottom:4}},"No accounts yet."),
                el('div',null,"Hit + Account to add your first.")
              )
            : sortedAccounts.map(a=>{
                const st=getStatus(a.lastTouch,a.followUpDate); const isActive=selected===a.id;
                const pendingEmails=a.activities.filter(act=>act.emailQueued&&!act.emailDone).length;
                return el('div',{key:a.id,onClick:()=>{setSelected(a.id);setEditing(false);},style:{padding:"11px 16px",cursor:"pointer",background:isActive?M.gray50:M.white,borderLeft:`3px solid ${isActive?M.green:"transparent"}`,borderBottom:`1px solid ${M.gray100}`}},
                  el('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
                    el(TierBadge,{tier:a.tier,small:true}),
                    el('span',{style:{fontSize:13,fontWeight:isActive?600:500,color:isActive?M.navy:M.gray700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}},a.name),
                    pendingEmails>0&&el('span',{style:{fontSize:10,fontWeight:700,background:M.orangeLight,color:M.orange,border:`1px solid ${M.orange}33`,padding:"1px 5px",borderRadius:10}},`${pendingEmails}✉`),
                    a.onsite&&el('span',null,"📍"),
                    el('div',{style:{width:7,height:7,borderRadius:"50%",background:STATUS[st].dot,flexShrink:0}})
                  ),
                  el('div',{style:{fontSize:11,color:M.gray400}},
                    (a.lastTouch===0?"Today":a.lastTouch===999?"Never":`${a.lastTouch}d ago`)+" · "+a.touchCount+" touches"+(a.followUpDate?" · FU "+a.followUpDate.slice(5).replace("-","/"):"")
                  )
                );
              })
        )
      ),

      el('div',{style:{flex:1,overflowY:"auto",padding:28,background:M.gray50}},

        // EMAIL QUEUE
        view==="emails"&&el('div',null,
          el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}},
            el('div',null,
              el('h2',{style:{fontSize:18,fontWeight:700,color:M.navy,marginBottom:4}},"Email Queue"),
              el('div',{style:{fontSize:13,color:M.gray500}},emailQueue.length>0?`${emailQueue.length} email${emailQueue.length>1?"s":""} to send`:"All clear — nothing pending.")
            )
          ),
          emailQueue.length===0
            ? el('div',{style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:12,padding:"48px 32px",textAlign:"center"}},
                el('div',{style:{fontSize:32,marginBottom:12}},"✅"),
                el('div',{style:{fontSize:15,fontWeight:600,color:M.navy,marginBottom:6}},"Inbox zero."),
                el('div',{style:{fontSize:13,color:M.gray400}},"Log a call and flag 'Send email: Yes' to queue items here.")
              )
            : el('div',{style:{display:"flex",flexDirection:"column",gap:10}},
                emailQueue.map(item=>
                  el('div',{key:item.id,style:{background:M.white,border:`1.5px solid ${M.orange}33`,borderRadius:12,padding:"16px 20px"}},
                    el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
                      el('div',{style:{display:"flex",alignItems:"center",gap:10}},
                        el(TierBadge,{tier:item.accountTier}),
                        el('span',{style:{fontSize:14,fontWeight:700,color:M.navy,cursor:"pointer"},onClick:()=>{setSelected(item.accountId);setView("accounts");}},item.accountName),
                        el('span',{style:{fontSize:11,color:M.gray400}},"· Called "+item.date)
                      ),
                      el('button',{onClick:()=>markEmailDone(item.accountId,item.id,item.emailNote),style:{background:M.green,color:M.white,border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700}},"✓ Mark Sent")
                    ),
                    item.note&&el('div',{style:{fontSize:12,color:M.gray500,marginBottom:10,padding:"8px 10px",background:M.gray50,borderRadius:6}},
                      el('span',{style:{color:M.gray400,fontWeight:600}},"Call note: "),item.note
                    ),
                    el('div',null,
                      el('div',{style:{fontSize:11,fontWeight:600,color:M.gray500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}},"Email note (optional)"),
                      el('textarea',{value:item.emailNote||"",onChange:ev=>updateEmailNote(item.accountId,item.id,ev.target.value),placeholder:"What are you sending? Pricing deck, intro, case study...",style:{width:"100%",background:M.gray50,border:`1px solid ${M.gray200}`,borderRadius:8,padding:"10px 12px",fontSize:13,color:M.gray700,resize:"none",height:64,outline:"none"}})
                    )
                  )
                )
              )
        ),

        // VISITS
        view==="visits"&&el('div',null,
          el('div',{style:{marginBottom:24}},
            el('div',{style:{fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}},"Your Bases · Click to Filter"),
            el('div',{style:{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:12}},
              Object.entries(BASES).map(([key,base])=>{
                const isActive=selectedBase===key;
                const count=onsiteAccounts.filter(a=>a.lat&&closestBase(a.lat,a.lng).key===key).length;
                return el('div',{key,onClick:()=>setSelectedBase(isActive?null:key),style:{background:isActive?base.color+"12":M.white,border:`1.5px solid ${isActive?base.color:base.color+"33"}`,borderRadius:10,padding:"14px 16px",cursor:"pointer"}},
                  el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}},
                    el('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      el('div',{style:{width:10,height:10,borderRadius:"50%",background:base.color}}),
                      el('span',{style:{fontSize:14,fontWeight:700,color:isActive?base.color:M.navy}},base.emoji+" "+base.label)
                    ),
                    el('span',{style:{fontSize:11,fontWeight:700,color:isActive?base.color:M.gray400,background:isActive?base.color+"20":M.gray100,padding:"2px 8px",borderRadius:20}},count+" accounts")
                  ),
                  el('div',{style:{fontSize:12,color:M.gray500}},base.address),
                  isActive&&el('div',{style:{fontSize:11,color:base.color,fontWeight:600,marginTop:6}},"Filtered · click to clear")
                );
              })
            )
          ),
          el('div',{style:{fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}},
            filteredOnsiteAccounts.length+" Onsite Targets"+(selectedBase?` · ${BASES[selectedBase].label}`:"")
          ),
          onsiteAccounts.length===0
            ? el('div',{style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"32px",textAlign:"center",color:M.gray400,fontSize:13}},"No accounts flagged. Open an account and click 📍 Mark Onsite.")
            : filteredOnsiteAccounts.length===0
            ? el('div',{style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"32px",textAlign:"center",color:M.gray400,fontSize:13}},"No onsite targets closest to "+BASES[selectedBase].label+".")
            : el('div',{style:{display:"flex",flexDirection:"column",gap:10}},
                filteredOnsiteAccounts.sort((a,b)=>{
                  if(!a.lat)return 1;if(!b.lat)return -1;
                  const ab=closestBase(a.lat,a.lng),bb=closestBase(b.lat,b.lng);
                  return ab.label<bb.label?-1:ab.label>bb.label?1:ab.miles-bb.miles;
                }).map(a=>{
                  const dists=a.lat?getBaseDists(a.lat,a.lng):null;const best=dists?dists[0]:null;
                  return el('div',{key:a.id,onClick:()=>{setSelected(a.id);setView("accounts");setEditing(false);},style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"16px 18px",cursor:"pointer"}},
                    el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:dists?10:0}},
                      el('div',{style:{display:"flex",alignItems:"center",gap:8}},
                        el(TierBadge,{tier:a.tier}),
                        el('span',{style:{fontSize:14,fontWeight:600,color:M.navy}},a.name),
                        a.address&&el('span',{style:{fontSize:12,color:M.gray400}},"· "+a.address)
                      ),
                      best&&el('div',{style:{fontSize:12,fontWeight:700,color:best.color,background:best.color+"15",border:`1px solid ${best.color}44`,padding:"4px 12px",borderRadius:20,display:"flex",alignItems:"center",gap:6}},
                        el('div',{style:{width:7,height:7,borderRadius:"50%",background:best.color}}),
                        best.label+" · "+best.miles+" mi"
                      )
                    ),
                    dists&&el('div',{style:{display:"flex",gap:16,paddingTop:8,borderTop:`1px solid ${M.gray100}`}},
                      dists.map((d,i)=>el('div',{key:d.key,style:{display:"flex",alignItems:"center",gap:5}},
                        el('div',{style:{width:6,height:6,borderRadius:"50%",background:i===0?d.color:M.gray300}}),
                        el('span',{style:{fontSize:12,color:i===0?d.color:M.gray400,fontWeight:i===0?600:400}},d.label+" · "+d.miles+" mi")
                      ))
                    )
                  );
                })
              )
        ),

        // NO ACCOUNT
        view!=="visits"&&view!=="emails"&&!account&&el('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:M.gray400}},
          accounts.length===0
            ? el('div',{style:{textAlign:"center"}},
                el('div',{style:{fontSize:36,marginBottom:12}},"🚀"),
                el('div',{style:{fontSize:15,fontWeight:600,color:M.navy,marginBottom:6}},"Welcome to AE Command."),
                el('div',{style:{fontSize:13,marginBottom:20}},"Add your first account to get started."),
                el('button',{onClick:()=>setAddingAccount(true),style:{background:M.green,color:M.white,border:"none",borderRadius:8,padding:"12px 24px",fontSize:14,fontWeight:600}},"+ Add Account")
              )
            : el('div',{style:{textAlign:"center"}},
                el('div',{style:{fontSize:36,marginBottom:12}},"←"),
                el('div',{style:{fontSize:14,fontWeight:500}},"Select an account")
              )
        ),

        // ACCOUNT DETAIL
        account&&view==="accounts"&&el('div',null,
          el('div',{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}},
            el('div',null,
              el('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}},
                el('h2',{style:{fontSize:20,fontWeight:700,color:M.navy}},account.name),
                !editing&&el('div',{style:{display:"flex",gap:4}},
                  [1,2,3,4,5].map(t=>{const tc=TIER_COLORS[t];const active=account.tier===t;return el('button',{key:t,onClick:()=>updateTier(account.id,t),style:{width:26,height:26,borderRadius:6,border:`1.5px solid ${active?tc.text:M.gray200}`,background:active?tc.bg:M.white,color:active?tc.text:M.gray400,fontSize:11,fontWeight:700}},t);})
                ),
                !editing&&el('button',{onClick:()=>toggleOnsite(account.id),style:{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${account.onsite?M.purple:M.gray200}`,background:account.onsite?M.purpleLight:M.white,color:account.onsite?M.purple:M.gray400,fontSize:12,fontWeight:600}},
                  account.onsite?"📍 Onsite Target":"📍 Mark Onsite"
                )
              ),
              !editing&&account.contacts.length>0&&el('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}},
                account.contacts.map((c,i)=>el('div',{key:i,style:{fontSize:12,color:M.gray500,background:M.white,border:`1px solid ${M.gray200}`,padding:"3px 10px",borderRadius:20}},c.name+(c.title?" · "+c.title:"")))
              ),
              !editing&&account.address&&el('div',{style:{fontSize:12,color:M.gray400}},"📍 "+account.address+(account.lat?` · Closest: ${BASES[closestBase(account.lat,account.lng).key].label} ~${closestBase(account.lat,account.lng).miles} mi`:""))
            ),
            el('div',{style:{display:"flex",gap:8,flexShrink:0}},
              !editing&&el('button',{onClick:startEdit,style:{background:M.white,color:M.gray600,border:`1px solid ${M.gray200}`,borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:500}},"✏️ Edit"),
              !editing&&el('button',{onClick:()=>deleteAccount(account.id),style:{background:M.white,color:M.red,border:`1px solid #FECACA`,borderRadius:8,padding:"9px 14px",fontSize:13}},"🗑️"),
              !editing&&el('button',{onClick:startLog,style:{background:M.green,color:M.white,border:"none",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,boxShadow:"0 1px 3px rgba(18,183,106,0.3)"}},"+ Log Call"),
              editing&&el('button',{onClick:saveEdit,style:{background:M.green,color:M.white,border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:600}},"Save"),
              editing&&el('button',{onClick:()=>setEditing(false),style:{background:M.white,color:M.gray500,border:`1px solid ${M.gray200}`,borderRadius:8,padding:"9px 16px",fontSize:13}},"Cancel")
            )
          ),

          editing&&editData&&el('div',{style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:12,padding:20,marginBottom:24}},
            el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
              el('div',null,el('label',{style:labelStyle},"Account Name"),el('input',{value:editData.name,onChange:ev=>setEditData(d=>({...d,name:ev.target.value})),style:editInputStyle})),
              el('div',null,el('label',{style:labelStyle},"Address / City"),el('input',{value:editData.address,onChange:ev=>setEditData(d=>({...d,address:ev.target.value})),placeholder:"Sacramento, CA",style:editInputStyle}))
            ),
            el('div',{style:{marginBottom:16}},
              el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
                el('label',{style:{...labelStyle,marginBottom:0}},"Contacts"),
                el('button',{onClick:()=>setEditData(d=>({...d,contacts:[...d.contacts,{name:"",title:""}]})),style:{fontSize:12,fontWeight:600,color:M.green,background:M.greenLight,border:`1px solid #A7F3D0`,borderRadius:6,padding:"3px 10px"}},"+ Add Contact")
              ),
              editData.contacts.map((c,i)=>
                el('div',{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,marginBottom:8,alignItems:"center"}},
                  el('input',{value:c.name,onChange:ev=>setEditData(d=>({...d,contacts:d.contacts.map((x,j)=>j===i?{...x,name:ev.target.value}:x)})),placeholder:"Contact name",style:{...editInputStyle,marginBottom:0}}),
                  el('input',{value:c.title,onChange:ev=>setEditData(d=>({...d,contacts:d.contacts.map((x,j)=>j===i?{...x,title:ev.target.value}:x)})),placeholder:"Title",style:{...editInputStyle,marginBottom:0}}),
                  editData.contacts.length>1&&el('button',{onClick:()=>setEditData(d=>({...d,contacts:d.contacts.filter((_,j)=>j!==i)})),style:{background:"transparent",border:"none",color:M.gray400,fontSize:16,padding:"0 4px"}},"×")
                )
              )
            ),
            el('div',{style:{marginBottom:14}},
              el('label',{style:labelStyle},"Priority Tier"),
              el('div',{style:{display:"flex",gap:8}},
                [1,2,3,4,5].map(t=>{const tc=TIER_COLORS[t];const active=parseInt(editData.tier)===t;return el('button',{key:t,onClick:()=>setEditData(d=>({...d,tier:t})),style:{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${active?tc.text:M.gray200}`,background:active?tc.bg:M.white,color:active?tc.text:M.gray500,fontSize:13,fontWeight:700}},t);})
              )
            ),
            el('div',{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:M.gray50,borderRadius:8,border:`1px solid ${M.gray200}`}},
              el('input',{type:"checkbox",id:"edit-onsite",checked:editData.onsite,onChange:ev=>setEditData(d=>({...d,onsite:ev.target.checked})),style:{width:16,height:16,accentColor:M.purple}}),
              el('label',{htmlFor:"edit-onsite",style:{fontSize:13,fontWeight:500,color:M.gray700,cursor:"pointer"}},"📍 Onsite visit target")
            )
          ),

          !editing&&el('div',{style:{display:"grid",gridTemplateColumns:"repeat(5, 1fr)",gap:12,marginBottom:24}},
            [{label:"Priority Tier",value:`Tier ${account.tier}`,type:"tier"},{label:"Total Touches",value:account.touchCount},{label:"Last Touch",value:account.lastTouch===0?"Today":account.lastTouch===999?"Never":`${account.lastTouch}d ago`},{label:"Follow-up",value:account.followUpDate?account.followUpDate.slice(5).replace("-","/"):"Not set"},{label:"Status",value:STATUS[s].label,type:"status"}]
            .map((stat,i)=>{
              const tc=TIER_COLORS[account.tier];
              const bg=stat.type==="tier"?tc.bg:stat.type==="status"?STATUS[s].bg:M.white;
              const border=stat.type==="tier"?tc.border:stat.type==="status"?STATUS[s].border:M.gray200;
              const valColor=stat.type==="tier"?tc.text:stat.type==="status"?STATUS[s].text:M.navy;
              const lblColor=stat.type==="tier"?tc.text:stat.type==="status"?STATUS[s].text:M.gray400;
              return el('div',{key:i,style:{background:bg,border:`1px solid ${border}`,borderRadius:10,padding:"14px 16px"}},
                el('div',{style:{fontSize:10,fontWeight:600,color:lblColor,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}},stat.label),
                el('div',{style:{fontSize:15,fontWeight:700,color:valColor}},String(stat.value))
              );
            })
          ),

          el('div',{style:{marginBottom:24}},
            el('div',{style:{fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}},"Account Notes"),
            el('textarea',{value:account.notes,onChange:ev=>updateNotes(account.id,ev.target.value),placeholder:"Procurement cycle, key stakeholders, context...",style:{width:"100%",background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"12px 14px",color:M.gray700,fontSize:13,resize:"none",height:72,outline:"none"}})
          ),

          el('div',{style:{fontSize:11,fontWeight:600,color:M.gray400,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}},"Activity History"),
          account.activities.length===0
            ? el('div',{style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"32px",textAlign:"center",color:M.gray400,fontSize:13}},"No activity logged yet.")
            : el('div',{style:{display:"flex",flexDirection:"column",gap:8}},
                account.activities.map(act=>{
                  const isEditingThis=editingActivity?.id===act.id;
                  if(isEditingThis){
                    return el('div',{key:act.id,style:{background:M.white,border:`1.5px solid ${M.green}`,borderRadius:10,padding:"14px 16px"}},
                      el('div',{style:{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}},
                        el('div',{style:{display:"flex",gap:8}},
                          ["Yes","No"].map(b=>el('button',{key:b,onClick:()=>setEditingActivity(e=>({...e,connected:b})),style:{padding:"5px 12px",borderRadius:6,border:`1.5px solid ${editingActivity.connected===b?(b==="Yes"?M.green:M.red):M.gray200}`,background:editingActivity.connected===b?(b==="Yes"?M.greenLight:M.redLight):M.white,color:editingActivity.connected===b?(b==="Yes"?M.greenDark:"#991B1B"):M.gray500,fontSize:12,fontWeight:600}},b==="Yes"?"✓ Connected":"✗ No Answer"))
                        )
                      ),
                      el('input',{value:editingActivity.note||"",onChange:ev=>setEditingActivity(e=>({...e,note:ev.target.value})),placeholder:"Call note...",style:{...inputStyle,marginBottom:10,fontSize:13,padding:"8px 10px"}}),
                      el('div',{style:{display:"flex",gap:8}},
                        el('button',{onClick:()=>saveActivity(account.id,act.id,editingActivity),style:{padding:"7px 16px",background:M.green,border:"none",borderRadius:6,color:M.white,fontSize:12,fontWeight:600}},"Save"),
                        el('button',{onClick:()=>setEditingActivity(null),style:{padding:"7px 16px",background:M.white,border:`1px solid ${M.gray200}`,borderRadius:6,color:M.gray500,fontSize:12}},"Cancel")
                      )
                    );
                  }
                  return el('div',{key:act.id,style:{background:M.white,border:`1px solid ${M.gray200}`,borderRadius:10,padding:"12px 16px"}},
                    el('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:(act.emailQueued||act.emailDone)?8:0}},
                      el('span',{style:{fontSize:11,fontWeight:700,background:M.blueLight,color:"#1D4ED8",border:"1px solid #BFDBFE",padding:"2px 8px",borderRadius:20,flexShrink:0}},"CALL"),
                      act.connected==="Yes"
                        ? el('span',{style:{background:M.greenLight,color:M.greenDark,border:"1px solid #A7F3D0",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,flexShrink:0}},"✓ Connected")
                        : el('span',{style:{background:M.gray100,color:M.gray500,border:`1px solid ${M.gray200}`,padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,flexShrink:0}},"No Answer"),
                      el('div',{style:{fontSize:13,color:M.gray600,flex:1}},act.note||"—"),
                      el('div',{style:{fontSize:11,color:M.gray400,flexShrink:0}},act.date),
                      el('button',{onClick:()=>setEditingActivity({...act}),title:"Edit",style:{background:"transparent",border:"none",color:M.gray400,fontSize:13,padding:"2px 4px"}},"✏️"),
                      el('button',{onClick:()=>deleteActivity(account.id,act.id),title:"Delete",style:{background:"transparent",border:"none",color:M.gray400,fontSize:13,padding:"2px 4px"}},"🗑️")
                    ),
                    (act.emailQueued||act.emailDone)&&el('div',{style:{display:"flex",alignItems:"center",gap:8,paddingTop:8,borderTop:`1px solid ${M.gray100}`}},
                      act.emailDone
                        ? el('span',{style:{fontSize:11,fontWeight:600,color:M.greenDark,background:M.greenLight,border:"1px solid #A7F3D0",padding:"2px 10px",borderRadius:20}},"✓ Email sent"+(act.emailSentDate?" "+act.emailSentDate:""))
                        : el('span',{style:{fontSize:11,fontWeight:600,color:M.orange,background:M.orangeLight,border:`1px solid ${M.orange}33`,padding:"2px 10px",borderRadius:20}},"📧 Email pending"),
                      act.emailNote&&el('span',{style:{fontSize:12,color:M.gray500}},act.emailNote)
                    )
                  );
                })
              )
        )
      )
    ),

    logging&&el('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      el('div',{style:{background:M.white,borderRadius:14,padding:28,width:380,boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}},
        el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}},
          el('div',null,
            el('div',{style:{fontSize:11,fontWeight:600,color:M.green,textTransform:"uppercase",marginBottom:2}},"Log Call"),
            el('div',{style:{fontSize:15,fontWeight:700,color:M.navy}},account?.name)
          ),
          el('div',{style:{fontSize:11,color:M.gray400,background:M.gray100,padding:"4px 10px",borderRadius:20}},`Step ${logStep} of ${logData.sendEmail==="Yes"?4:3}`)
        ),
        logStep===1&&el('div',null,
          el('div',{style:{fontSize:13,fontWeight:500,color:M.gray700,marginBottom:12}},"Did you connect?"),
          el('div',{style:{display:"flex",gap:10}},
            ["Yes","No"].map(b=>el('button',{key:b,onClick:()=>{setLogData(d=>({...d,connected:b}));setLogStep(2);},style:{flex:1,padding:"16px",background:b==="Yes"?M.greenLight:M.gray50,border:`1.5px solid ${b==="Yes"?"#A7F3D0":M.gray200}`,borderRadius:10,color:b==="Yes"?M.greenDark:M.gray700,fontSize:14,fontWeight:700}},b==="Yes"?"✓ Connected":"✗ No Answer"))
          )
        ),
        logStep===2&&el('div',null,
          el('div',{style:{fontSize:13,fontWeight:500,color:M.gray700,marginBottom:12}},"Send a follow-up email?"),
          el('div',{style:{display:"flex",gap:10}},
            ["Yes","No"].map(b=>el('button',{key:b,onClick:()=>{setLogData(d=>({...d,sendEmail:b}));setLogStep(3);},style:{flex:1,padding:"16px",background:b==="Yes"?M.orangeLight:M.gray50,border:`1.5px solid ${b==="Yes"?M.orange:M.gray200}`,borderRadius:10,color:b==="Yes"?M.orange:M.gray700,fontSize:14,fontWeight:700}},b==="Yes"?"📧 Yes, queue it":"✗ No"))
          )
        ),
        logStep===3&&el('div',null,
          el('div',{style:{fontSize:13,fontWeight:500,color:M.gray700,marginBottom:12}},"Quick call note (optional)"),
          el('textarea',{value:logData.note,onChange:ev=>setLogData(d=>({...d,note:ev.target.value})),placeholder:"What happened? Context for the email...",style:{...inputStyle,resize:"none",height:80,marginBottom:12}}),
          logData.sendEmail==="Yes"
            ? el('button',{onClick:()=>setLogStep(4),style:{width:"100%",padding:"12px",background:M.navy,border:"none",borderRadius:8,color:M.white,fontSize:13,fontWeight:600}},"Next →")
            : el('button',{onClick:submitLog,style:{width:"100%",padding:"13px",background:M.green,border:"none",borderRadius:8,color:M.white,fontSize:14,fontWeight:700}},"Log It")
        ),
        logStep===4&&logData.sendEmail==="Yes"&&el('div',null,
          el('div',{style:{fontSize:13,fontWeight:500,color:M.gray700,marginBottom:12}},"What are you sending? (optional)"),
          el('textarea',{value:logData.emailNote,onChange:ev=>setLogData(d=>({...d,emailNote:ev.target.value})),placeholder:"Intro deck, pricing, case study...",style:{...inputStyle,resize:"none",height:80,marginBottom:12}}),
          el('button',{onClick:submitLog,style:{width:"100%",padding:"13px",background:M.green,border:"none",borderRadius:8,color:M.white,fontSize:14,fontWeight:700}},"Log It + Queue Email")
        ),
        el('button',{onClick:()=>setLogging(false),style:{width:"100%",marginTop:10,padding:"8px",background:"transparent",border:"none",color:M.gray400,fontSize:12}},"Cancel")
      )
    ),

    addingAccount&&el('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      el('div',{style:{background:M.white,borderRadius:14,padding:28,width:440,boxShadow:"0 20px 60px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}},
        el('div',{style:{fontSize:15,fontWeight:700,color:M.navy,marginBottom:20}},"Add Account"),
        el('label',{style:labelStyle},"Account Name *"),
        el('input',{type:"text",placeholder:"Company name",value:newAccount.name,onChange:ev=>setNewAccount(n=>({...n,name:ev.target.value})),style:inputStyle}),
        el('label',{style:labelStyle},"Priority Tier"),
        el('div',{style:{display:"flex",gap:8,marginBottom:14}},
          [1,2,3,4,5].map(t=>{const tc=TIER_COLORS[t];const active=parseInt(newAccount.tier)===t;return el('button',{key:t,onClick:()=>setNewAccount(n=>({...n,tier:t})),style:{flex:1,padding:"10px 0",borderRadius:8,border:`1.5px solid ${active?tc.text:M.gray200}`,background:active?tc.bg:M.white,color:active?tc.text:M.gray500,fontSize:13,fontWeight:700}},t);})
        ),
        el('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
          el('label',{style:{...labelStyle,marginBottom:0}},"Contacts"),
          el('button',{onClick:()=>setNewAccount(n=>({...n,contacts:[...n.contacts,{name:"",title:""}]})),style:{fontSize:12,fontWeight:600,color:M.green,background:M.greenLight,border:`1px solid #A7F3D0`,borderRadius:6,padding:"3px 10px"}},"+ Add")
        ),
        newAccount.contacts.map((c,i)=>
          el('div',{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,marginBottom:8,alignItems:"center"}},
            el('input',{value:c.name,onChange:ev=>setNewAccount(n=>({...n,contacts:n.contacts.map((x,j)=>j===i?{...x,name:ev.target.value}:x)})),placeholder:"Contact name",style:{...inputStyle,marginBottom:0}}),
            el('input',{value:c.title,onChange:ev=>setNewAccount(n=>({...n,contacts:n.contacts.map((x,j)=>j===i?{...x,title:ev.target.value}:x)})),placeholder:"Title",style:{...inputStyle,marginBottom:0}}),
            newAccount.contacts.length>1&&el('button',{onClick:()=>setNewAccount(n=>({...n,contacts:n.contacts.filter((_,j)=>j!==i)})),style:{background:"transparent",border:"none",color:M.gray400,fontSize:18,padding:"0 4px"}},"×")
          )
        ),
        el('div',{style:{height:8}}),
        el('label',{style:labelStyle},"Address / City"),
        el('input',{type:"text",placeholder:"Sacramento, CA",value:newAccount.address,onChange:ev=>setNewAccount(n=>({...n,address:ev.target.value})),style:inputStyle}),
        el('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:18,padding:"12px",background:M.gray50,borderRadius:8,border:`1px solid ${M.gray200}`}},
          el('input',{type:"checkbox",id:"onsite-check",checked:newAccount.onsite,onChange:ev=>setNewAccount(n=>({...n,onsite:ev.target.checked})),style:{width:16,height:16,accentColor:M.purple}}),
          el('label',{htmlFor:"onsite-check",style:{fontSize:13,fontWeight:500,color:M.gray700,cursor:"pointer"}},"📍 Flag as onsite visit target")
        ),
        el('button',{onClick:addAccount,style:{width:"100%",padding:"13px",background:M.green,border:"none",borderRadius:8,color:M.white,fontSize:14,fontWeight:700}},"Add Account"),
        el('button',{onClick:()=>setAddingAccount(false),style:{width:"100%",marginTop:8,padding:"8px",background:"transparent",border:"none",color:M.gray400,fontSize:12}},"Cancel")
      )
    ),

    confirm&&el(ConfirmDialog,{message:confirm.message,onConfirm:confirm.onConfirm,onCancel:()=>setConfirm(null)})
  );
}

ReactDOM.render(el(App), document.getElementById('root'));
</script>
</body>
</html>
